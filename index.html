<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ReportVault Dashboard</title>
  <style>
    body {
      background: #f8f7f3;
      font-family: 'Lato', Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    .header {
      text-align: center;
      padding: 40px 0 20px 0;
      background: none;
    }
    .logo-text {
      font-size: 52px;
      font-weight: bold;
      color: #2d3c48;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }
    .tagline {
      font-size: 22px;
      color: #658572;
      margin-bottom: 35px;
      font-weight: 400;
    }
    .stats-container {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin: 0 auto 40px auto;
      max-width: 1100px;
    }
    .stat-card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 3px 14px rgba(44, 62, 80, 0.08);
      padding: 32px 30px;
      text-align: center;
      flex: 1 1 210px;
      min-width: 180px;
      transition: box-shadow 0.3s;
    }
    .stat-card:hover {
      box-shadow: 0 4px 18px rgba(44, 62, 80, 0.18);
    }
    .stat-title {
      font-size: 17px;
      color: #65787a;
      margin-bottom: 12px;
      font-weight: 500;
    }
    .stat-value {
      font-size: 34px;
      color: #2d3c48;
      font-weight: bold;
      margin-bottom: 4px;
    }
    @media (max-width: 800px) {
      .stats-container {
        flex-direction: column;
        align-items: center;
      }
      .stat-card {
        margin-bottom: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-text">ReportVault</div>
    <div class="tagline">Secure. Store. Analyze.</div>
  </div>
  <div class="stats-container">
    <div class="stat-card">
      <div class="stat-title">Total Reports</div>
      <div class="stat-value">320</div>
    </div>
    <div class="stat-card">
      <div class="stat-title">Dashboards</div>
      <div class="stat-value">48</div>
    </div>
    <div class="stat-card">
      <div class="stat-title">Users</div>
      <div class="stat-value">1,240</div>
    </div>
    <div class="stat-card">
      <div class="stat-title">Storage Used</div>
      <div class="stat-value">8.5 TB</div>
    </div>
  </div>
</body>
</html>
